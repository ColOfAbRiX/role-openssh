---

# Version to install:
# - Leave empty for latest version, if not already installed;
# - "latest" to updated to latest version;
# - "x.y.z" to install a specific version
ssh_version: ""

# Tells if to enable the ssh deamon
ssh_server_enabled: yes

# Path of SSH configuration
ssh_config_path: /etc/ssh

# Definition of the SSH Server Keys
ssh_host_keys:
 - name: ssh_host_rsa_key
 - name: ssh_host_ed25519_key
 - name: ssh_host_ecdsa_key

# List of the Authorized Keys file
ssh_authkeys_files:
 - ~/.ssh/authorized_keys

# User SSH Identity files
ssh_identity_files:
 - ~/.ssh/id_rsa

# Global path of the users' known_hosts files, including the filename
ssh_knownhosts_files:
 - ~/.ssh/known_hosts

# Enables the agent and automatic handling of keys
ssh_agent_enabled: false
ssh_agent_keys_timeout: 1800

## SSHD server configuration. See man sshd_config. ##


#
# General daemon
#

# Specifies the file that contains the process ID of the SSH daemon. The
# default is /var/run/sshd.pid.
#sshd_PidFile: /var/run/sshd.pid

# Specifies the protocol versions sshd(8) supports. The possible values are '1'
# and '2'. Multiple versions must be comma-separated. The default is '2'.
# Note that the order of the protocol list does not indicate preference, because
# the client selects among multiple protocol versions offered by the server.
# Specifying "2,1" is identical to "1,2".
sshd_Protocol: 2

# Gives the facility code that is used when logging messages from sshd(8). The
# possible values are: DAEMON, USER, AUTH, AUTHPRIV, LOCAL0, LOCAL1, LOCAL2,
# LOCAL3, LOCAL4, LOCAL5, LOCAL6, LOCAL7. The default is AUTH.
sshd_SyslogFacility: AUTHPRIV

# Gives the verbosity level that is used when logging messages from sshd(8).
# The possible values are: QUIET, FATAL, ERROR, INFO, VERBOSE, DEBUG, DEBUG1,
# DEBUG2, and DEBUG3. The default is INFO. DEBUG and DEBUG1 are equivalent.
# DEBUG2 and DEBUG3 each specify higher levels of debugging output. Logging
# with a DEBUG level violates the privacy of users and is not recommended.
#sshd_LogLevel: INFO

#
# Network configuration
#

# Specifies which address family should be used by sshd(8). Valid arguments are
# "any", "inet" (use IPv4 only), or "inet6" (use IPv6 only). The default is
# "any".
sshd_AddressFamily: inet

# Specifies the port number that sshd(8) listens on. The default is 22.
# Multiple options of this type are permitted. See also ListenAddress.
sshd_Port: 22

# Specifies the local addresses sshd(8) should listen on. The following forms
# may be used:
#
#    ListenAddress host|IPv4_addr|IPv6_addr
#    ListenAddress host|IPv4_addr:port
#    ListenAddress [host|IPv6_addr]:port
#
# If port is not specified, sshd will listen on the address and all prior Port
# options specified. The default is to listen on all local addresses. Multiple
# ListenAddress options are permitted. Additionally, any Port options must
# precede this option for non-port qualified addresses.
sshd_ListenAddresses: [0.0.0.0]

# Specifies whether compression is allowed, or delayed until the user has
# authenticated successfully. The argument must be "yes", "delayed", or "no".
# The default is "delayed".
#sshd_Compression: delayed

# Specifies the IPv4 type-of-service or DSCP class for the connection. Accepted
# values are "af11", "af12", "af13", "af21", "af22", "af23", "af31", "af32",
# "af33", "af41", "af42", "af43", "cs0", "cs1", "cs2", "cs3", "cs4", "cs5",
# "cs6", "cs7", "ef", "lowdelay", "throughput", "reliability", or a numeric
# value. This option may take one or two arguments, separated by whitespace.
# If one argument is specified, it is used as the packet class unconditionally.
# If two values are specified, the first is automatically selected for
# interactive sessions and the second for non-interactive sessions. The default
# is "lowdelay" for interactive sessions and "throughput" for non-interactive
# sessions.
#sshd_IPQoS: lowdelay

# Specifies whether sshd(8) should look up the remote host name and check that
# the resolved host name for the remote IP address maps back to the very same IP
# address. The default is "yes".
#sshd_UseDNS: 'yes'

# Specifies whether the system should send TCP keepalive messages to the other
# side. If they are sent, death of the connection or crash of one of the
# machines will be properly noticed. However, this means that connec‐ tions
# will die if the route is down temporarily, and some people find it annoying.
# On the other hand, if TCP keepalives are not sent, sessions may hang
# indefinitely on the server, leaving "ghost" users and consuming server
# resources.
#
# The default is "yes" (to send TCP keepalive messages), and the server will
# notice if the network goes down or the client host crashes. This avoids
# infinitely hanging sessions.
#
# To disable TCP keepalive messages, the value should be set to "no".
#sshd_TCPKeepAlive: 'yes'

# Sets the number of client alive messages (see below) which may be sent without
# sshd(8) receiving any messages back from the client. If this threshold is
# reached while client alive messages are being sent, sshd will disconnect the
# client, terminating the session. It is important to note that the use of
# client alive messages is very different from TCPKeepAlive (below). The client
# alive messages are sent through the encrypted channel and therefore will not
# be spoofable. The TCP keepalive option enabled by TCPKeepAlive is spoofable.
# The client alive mechanism is valuable when the client or server depend on
# knowing when a connection has become inactive.
#
# The default value is 3. If ClientAliveInterval (see below) is set to 15, and
# ClientAliveCountMax is left at the default, unresponsive SSH clients will be
# disconnected after approximately 45 seconds. This option applies to protocol
# version 2 only.
#sshd_ClientAliveCountMax: 3

# Sets a timeout interval in seconds after which if no data has been received
# from the client, sshd(8) will send a message through the encrypted channel to
# request a response from the client. The default is 0, indicating that these
# messages will not be sent to the client. This option applies to protocol
# version 2 only.
#sshd_ClientAliveInterval: 900

#
# Authentication
#

# Specifies the authentication methods that must be successfully completed for a
# user to be granted access. This option must be followed by one or more comma-
# separated lists of authentication method names, or by the single string "any"
# to indicate the default behaviour of accepting any single authentication
# method. if the default is overridden, then successful authentication requires
# completion of every method in at least one of these lists.
#
# For example, an argument of "publickey,password publickey,keyboard-
# interactive" would require the user to complete public key authentication,
# followed by either password or keyboard interactive authentication. Only
# methods that are next in one or more lists are offered at each stage, so for
# this example, it would not be possible to attempt password or keyboard-
# interactive authentication before public key.
#
# For keyboard interactive authentication it is also possible to restrict
# authentication to a specific device by appending a colon followed by the
# device identifier "bsdauth", "pam", or "skey", depending on the server
# configuration. For example, "keyboard-interactive:bsdauth" would restrict
# keyboard interactive authentication to the "bsdauth" device.
#
# This option is only available for SSH protocol 2 and will yield a fatal error
# if enabled if protocol 1 is also enabled. Note that each authentication
# method listed should also be explicitly enabled in the configura‐tion. The
# default "any" is not to require multiple authentication; successful completion
# of a single authentication method is sufficient.
sshd_AuthenticationMethods: ['password keyboard-interactive publickey']

# Specifies whether password authentication is allowed. The default is "yes".
#sshd_PasswordAuthentication: 'yes'

# Specifies whether user authentication based on GSSAPI is allowed. The default
# is "no". Note that this option applies to protocol version 2 only.
#sshd_GSSAPIAuthentication: 'no'

# Specifies whether the password provided by the user for PasswordAuthentication
# will be validated through the Kerberos KDC. To use this option, the server
# needs a Kerberos servtab which allows the verification of the KDC's identity.
# The default is "no".
#sshd_KerberosAuthentication: 'no'

# Specifies whether rhosts or /etc/hosts.equiv authentication together with
# successful public key client host authentication is allowed (host-based
# authentication). This option is similar to RhostsRSAAuthentication and
# applies to protocol version 2 only. The default is "no".
#sshd_HostbasedAuthentication: 'no'

# Specifies whether public key authentication is allowed. The default is "yes".
# Note that this option applies to protocol version 2 only.
#sshd_PubkeyAuthentication: 'yes'

# Specifies whether rhosts or /etc/hosts.equiv authentication together with
# successful RSA host authentication is allowed. The default is "no". This
# option applies to protocol version 1 only.
#sshd_RhostsRSAAuthentication: 'no'

# Specifies whether pure RSA authentication is allowed. The default is "yes".
# This option applies to protocol version 1 only.
#sshd_RSAAuthentication: 'no'

# Specifies the full pathname of the xauth(1) program. The default is
# /usr/bin/xauth.
#sshd_XAuthLocation: /usr/bin/xauth

# Specifies whether to allow keyboard-interactive authentication. The argument
# to this keyword must be "yes" or "no". The default is to use whatever value
# ChallengeResponseAuthentication is set to (by default "yes").
#sshd_KbdInteractiveAuthentication: 'yes'

# Specifies whether challenge-response authentication is allowed (e.g. via PAM
# or though authentication styles supported in login.conf(5)) The default is
# "yes".
#sshd_ChallengeResponseAuthentication: 'yes'

# Specifies whether or not the server will attempt to perform a reverse name
# lookup when matching the name in the ~/.shosts, ~/.rhosts, and
# /etc/hosts.equiv files during HostbasedAuthentication. A setting of "yes"
# means that sshd(8) uses the name supplied by the client rather than attempting
# to resolve the name from the TCP connection itself. The default is "no".
#sshd_HostbasedUsesNameFromPacketOnly: 'no'

#
# Host keys and Certificates
#

# Specifies a file containing a private host key used by SSH. The default is
# /etc/ssh/ssh_host_key for protocol version 1, and /etc/ssh/ssh_host_dsa_key,
# /etc/ssh/ssh_host_ecdsa_key, /etc/ssh/ssh_host_ed25519_key and
# /etc/ssh/ssh_host_rsa_key for protocol version 2. Note that sshd(8) will
# refuse to use a file if it is group/world-accessible. It is possible to have
# multiple host key files. "rsa1" keys are used for version 1 and "dsa",
# "ecdsa", "ed25519" or "rsa" are used for version 2 of the SSH protocol. It is
# also possible to specify public host key files instead. In this case
# operations on the private key will be delegated to an ssh-agent(1).
sshd_HostKeys: "{{ ssh_host_keys | map(attribute='name') | list }}"

# In protocol version 1, the ephemeral server key is automatically regenerated
# after this many seconds (if it has been used). The purpose of regeneration is
# to prevent decrypting captured sessions by later breaking into the machine and
# stealing the keys. The key is never stored anywhere. If the value is 0, the
# key is never regenerated. The default is 3600 (seconds).
#sshd_KeyRegenerationInterval: 1h

# Specifies the maximum amount of data that may be transmitted before the
# session key is renegotiated, optionally followed a maximum amount of time that
# may pass before the session key is renegotiated. The first argu‐ ment is
# specified in bytes and may have a suffix of 'K', 'M', or 'G' to indicate
# Kilobytes, Megabytes, or Gigabytes, respectively. The default is between '1G'
# and '4G', depending on the cipher. The optional second value is specified in
# seconds and may use any of the units documented in the TIME FORMATS section.
# The default value for RekeyLimit is "default none", which means that rekeying
# is performed after the cipher's default amount of data has been sent or
# received and no time based rekeying is done. This option applies to protocol
# version 2 only.
#sshd_RekeyLimit: 'default none'

# Defines the number of bits in the ephemeral protocol version 1 server key.
# The minimum value is 512, and the default is 1024.
#sshd_ServerKeyBits: 2048

# Specifies revoked public keys. Keys listed in this file will be refused for
# public key authentication. Note that if this file is not readable, then public
# key authentication will be refused for all users. Keys may be specified as a
# text file, listing one public key per line, or as an OpenSSH Key Revocation
# List (KRL) as generated by ssh-keygen(1). For more information on KRLs, see
# the KEY REVOCATION LISTS section in ssh-keygen(1).
#sshd_RevokedKeys: ''

# Specifies a file containing a public host certificate. The certificate's
# public key must match a private host key already specified by HostKey. The
# default behaviour of sshd(8) is not to load any certificates.
#sshd_HostCertificate: ''

# Identifies the UNIX-domain socket used to communicate with an agent that has
# access to the private host keys. If "SSH_AUTH_SOCK" is specified, the
# location of the socket will be read from the SSH_AUTH_SOCK environ‐ ment
# variable.
#sshd_HostKeyAgent: ''

#
# Authorized Client Keys and CA
#

# Specifies a program to be used to look up the user's public keys. The program
# must be owned by root and not writable by group or others. It will be invoked
# with a single argument of the username being authenticated, and should produce
# on standard output zero or more lines of authorized_keys output (see
# AUTHORIZED_KEYS in sshd(8)). If a key supplied by AuthorizedKeysCommand does
# not successfully authenticate and authorize the user then public key
# authentication continues using the usual AuthorizedKeysFile files. By
# default, no AuthorizedKeysCommand is run.
#sshd_AuthorizedKeysCommand: none

# Specifies the user under whose account the AuthorizedKeysCommand is run. It
# is recommended to use a dedicated user that has no other role on the host than
# running authorized keys commands.
#sshd_AuthorizedKeysCommandUser: nobody

# Specifies a file that lists principal names that are accepted for certificate
# authentication. When using certificates signed by a key listed in
# TrustedUserCAKeys, this file lists names, one of which must appear in the
# certificate for it to be accepted for authentication. Names are listed one
# per line preceded by key options (as described in AUTHORIZED_KEYS FILE FORMAT
# in sshd(8)). Empty lines and comments starting with '#' are ignored.
#
# AuthorizedPrincipalsFile may contain tokens of the form %T which are
# substituted during connection setup. The following tokens are defined: %% is
# replaced by a literal '%', %h is replaced by the home directory of the user
# being authenticated, and %u is replaced by the username of that user. After
# expansion, AuthorizedPrincipalsFile is taken to be an absolute path or one
# relative to the user's home directory.
#
# The default is "none", i.e. not to use a principals file – in this case, the
# username of the user must appear in a certificate's principals list for it to
# be accepted. Note that AuthorizedPrincipalsFile is only used when
# authentication proceeds using a CA listed in TrustedUserCAKeys and is not
# consulted for certification authorities trusted via ~/.ssh/authorized_keys,
# though the principals= key option offers a similar facility (see sshd(8) for
# details).
#sshd_AuthorizedPrincipalsFile: none

# Specifies the file that contains the public keys that can be used for user
# authentication. The format is described in the AUTHORIZED_KEYS FILE FORMAT
# section of sshd(8). AuthorizedKeysFile may contain tokens of the form %T
# which are substituted during connection setup. The following tokens are
# defined: %% is replaced by a literal '%', %h is replaced by the home directory
# of the user being authenticated, and %u is replaced by the username of that
# user. After expansion, AuthorizedKeysFile is taken to be an absolute path or
# one relative to the user's home directory. Multiple files may be listed,
# separated by whitespace.
sshd_AuthorizedKeysFiles: "{{ ssh_authkeys_files | map('regex_replace', '^~/', '') | list }}"

# Specifies a file containing public keys of certificate authorities that are
# trusted to sign user certificates for authentication. Keys are listed one per
# line; empty lines and comments starting with '#' are allowed. If a certificate
# is presented for authentication and has its signing CA key listed in this
# file, then it may be used for authentication for any user listed in the
# certificate's principals list. Note that certificates that lack a list of
# principals will not be permitted for authentication using TrustedUserCAKeys.
# For more details on certificates, see the CERTIFICATES section in ssh-
# keygen(1).
#sshd_TrustedUserCAKeys: ''

#
# Security
#

# Specifies whether sshd will display the patch level of the binary in the
# identification string. The patch level is set at compile-time. The default
# is "no". This option applies to protocol version 1 only.
#sshd_ShowPatchLevel: 'no'

# Specifies whether root can log in using ssh(1). The argument must be "yes",
# "without-password", "forced-commands-only", or "no". The default is "yes".
#
# If this option is set to "without-password", password authentication is
# disabled for root.
#
# If this option is set to "forced-commands-only", root login with public key
# authentication will be allowed, but only if the command option has been
# specified (which may be useful for taking remote backups even if root login is
# normally not allowed). All other authentication methods are disabled for
# root.
#
# If this option is set to "no", root is not allowed to log in.
sshd_PermitRootLogin: 'no'

# Specifies the pathname of a directory to chroot(2) to after authentication.
# All components of the pathname must be root-owned directories that are not
# writable by any other user or group. After the chroot, sshd(8) changes the
# working directory to the user's home directory.
#
# The pathname may contain the following tokens that are expanded at runtime
# once the connecting user has been authenticated: %% is replaced by a literal
# '%', %h is replaced by the home directory of the user being authenticated, and
# %u is replaced by the username of that user.
#
# The ChrootDirectory must contain the necessary files and directories to
# support the user's session. For an interactive session this requires at least
# a shell, typically sh(1), and basic /dev nodes such as null(4), zero(4),
# stdin(4), stdout(4), stderr(4), arandom(4) and tty(4) devices. For file
# transfer sessions using "sftp", no additional configuration of the environment
# is necessary if the in-process sftp server is used, though sessions which use
# logging do require /dev/log inside the chroot directory (see sftp-server(8)
# for details).
#
#The default is not to chroot(2).
#sshd_ChrootDirectory: none

# Specifies that .rhosts and .shosts files will not be used in
# RhostsRSAAuthentication or HostbasedAuthentication.
#
# /etc/hosts.equiv and /etc/ssh/shosts.equiv are still used. The default is
# "yes".
#sshd_IgnoreRhosts: 'yes'

# Forces the execution of the command specified by ForceCommand, ignoring any
# command supplied by the client and ~/.ssh/rc if present. The command is
# invoked by using the user's login shell with the -c option. This applies to
# shell, command, or subsystem execution. It is most useful inside a Match
# block. The command originally supplied by the client is available in the
# SSH_ORIGINAL_COMMAND environment variable. Specifying a command of "internal-
# sftp" will force the use of an in-process sftp server that requires no support
# files when used with ChrootDirectory.
#sshd_ForceCommands: []

# Specifies whether sshd(8) should check file modes and ownership of the user's
# files and home directory before accepting login. This is normally desirable
# because novices sometimes accidentally leave their directory or files world-
# writable. The default is "yes". Note that this does not apply to
# ChrootDirectory, whose permissions and ownership are checked unconditionally.
#sshd_StrictModes: 'yes'

# Specifies whether pty(4) allocation is permitted. The default is "yes".
#sshd_PermitTTY: 'yes'

# Enables the Pluggable Authentication Module interface. If set to "yes" this
# will enable PAM authentication using ChallengeResponseAuthentication and
# PasswordAuthentication in addition to PAM account and session mod‐ ule
# processing for all authentication types.
#
# Because PAM challenge-response authentication usually serves an equivalent
# role to password authentication, you should disable either
# PasswordAuthentication or ChallengeResponseAuthentication.
#
# If UsePAM is enabled, you will not be able to run sshd(8) as a non-root user.
# The default is "no".
sshd_UsePAM: 'yes'

# When password authentication is allowed, it specifies whether the server
# allows login to accounts with empty password strings. The default is "no".
#sshd_PermitEmptyPasswords: 'no'

# Specifies whether sshd(8) should ignore the user's ~/.ssh/known_hosts during
# RhostsRSAAuthentication or HostbasedAuthentication. The default is "no".
#sshd_IgnoreUserKnownHosts: 'no'

# Specifies whether ~/.ssh/environment and environment= options in
# ~/.ssh/authorized_keys are processed by sshd(8). The default is "no".
# Enabling environment processing may enable users to bypass access restrictions
# in some configurations using mechanisms such as LD_PRELOAD.
#sshd_PermitUserEnvironment: 'no'

# When using SSH2, this option controls the exposure of the list of successful
# authentication methods to PAM during the authentication and to the shell
# environment via the SSH_USER_AUTH variable. See the description of this
# variable for more details. Valid options are: "never" (Do not expose
# successful authentication methods), "pam-only" (Only expose them to PAM during
# authentication, not afterwards), "pam-and-env" (Expose them to PAM and keep
# them in the shell environment). The default is "never".
#sshd_ExposeAuthenticationMethods: never

# Specifies what environment variables sent by the client will be copied into
# the session's environ(7). See SendEnv in ssh_config(5) for how to configure
# the client. Note that environment passing is only supported for
# protocol 2, and that the TERM environment variable is always sent whenever the
# client requests a pseudo-terminal as it is required by the protocol.
# Variables are specified by name, which may contain the wildcard
# characters '*' and '?'. Multiple environment variables may be separated by
# whitespace or spread across multiple AcceptEnv directives. Be warned that
# some environment variables could be used to bypass restricted user
# environments. For this reason, care should be taken in the use of this
# directive. The default is not to accept any environment variables
sshd_AcceptEnv: [ LANG, LC_CTYPE, LC_NUMERIC, LC_TIME, LC_COLLATE, LC_MONETARY,
  LC_MESSAGES, LC_PAPER, LC_NAME, LC_ADDRESS, LC_TELEPHONE, LC_MEASUREMENT,
  LC_IDENTIFICATION, LC_ALL, LANGUAGE, XMODIFIERS ]

#
# Ciphers and hashing algorithms
#

# Specifies the ciphers allowed for protocol version 2. Multiple ciphers must be
# comma-separated. The list of available ciphers may also be obtained using the
# -Q option of ssh(1).
#sshd_Ciphers: [ aes128-ctr, aes192-ctr, aes256-ctr, arcfour256, arcfour128 ]

# Specifies the available KEX (Key Exchange) algorithms. Multiple algorithms
# must be comma-separated.
#sshd_KexAlgorithms: [ curve25519-sha256@libssh.org, ecdh-sha2-nistp256,
#  ecdh-sha2-nistp384, ecdh-sha2-nistp521, diffie-hellman-group-exchange-sha256,
#  diffie-hellman-group-exchange-sha1, diffie-hellman-group14-sha1,
#  diffie-hellman-group1-sha1 ]

# Specifies the available MAC (message authentication code) algorithms. The MAC
# algorithm is used in protocol version 2 for data integrity protection.
# Multiple algorithms must be comma-separated. The algorithms that contain
# "-etm" calculate the MAC after encryption (encrypt-then-mac). These are
# considered safer and their use recommended. The default is:
#sshd_MACs: [ hmac-sha1, umac-64@openssh.com, hmac-ripemd160 ]

#
# Forwarding
#

# Specifies whether ssh-agent(1) forwarding is permitted. The default is "yes".
# Note that disabling agent forwarding does not improve security unless users
# are also denied shell access, as they can always install their own forwarders
#sshd_AllowAgentForwarding: 'no'

# Specifies whether TCP forwarding is permitted. The available options are
# "yes" or "all" to allow TCP forwarding, "no" to prevent all TCP forwarding,
# "local" to allow local (from the perspective of ssh(1)) forwarding only or
# "remote" to allow remote forwarding only. The default is "yes". Note that
# disabling TCP forwarding does not improve security unless users are also
# denied shell access, as they can always install their own forwarders.
#sshd_AllowTcpForwarding: 'no'

# Specifies whether X11 forwarding is permitted. The argument must be "yes" or
# "no". The default is "no".
#
# When X11 forwarding is enabled, there may be additional exposure to the server
# and to client displays if the sshd(8) proxy display is configured to listen on
# the wildcard address (see X11UseLocalhost below), though this is not the
# default. Additionally, the authentication spoofing and authentication data
# verification and substitution occur on the client side. The security risk of
# using X11 forwarding is that the client's X11 display server may be exposed to
# attack when the SSH client requests forwarding (see the warnings for
# ForwardX11 in ssh_config(5)). A system administrator may have a stance in
# which they want to protect clients that may expose themselves to attack by
# unwittingly requesting X11 forwarding, which can warrant a "no" setting.
#
# Note that disabling X11 forwarding does not prevent users from forwarding X11
# traffic, as users can always install their own forwarders. X11 forwarding is
# automatically disabled if UseLogin is enabled.
#sshd_X11Forwarding: 'no'

# Specifies whether remote hosts are allowed to connect to ports forwarded for
# the client. By default, sshd(8) binds remote port forwardings to the loopback
# address. This prevents other remote hosts from connecting to forwarded ports.
# GatewayPorts can be used to specify that sshd should allow remote port
# forwardings to bind to non-loopback addresses, thus allowing other hosts to
# connect. The argument may be "no" to force remote port forwardings to be
# available to the local host only, "yes" to force remote port forwardings to
# bind to the wildcard address, or "clientspecified" to allow the client to
# select the address to which the forwarding is bound. The default is "no".
#sshd_GatewayPorts: 'no'

# Specifies whether tun(4) device forwarding is allowed. The argument must be
# "yes", "point-to-point" (layer 3), "ethernet" (layer 2), or "no". Specifying
# "yes" permits both "point-to-point" and "ethernet". The default is "no".
#sshd_PermitTunnel: 'no'

# Specifies the destinations to which TCP port forwarding is permitted. The
# forwarding specification must be one of the following forms:
#
#    PermitOpen host:port
#    PermitOpen IPv4_addr:port
#    PermitOpen [IPv6_addr]:port
#
# Multiple forwards may be specified by separating them with whitespace. An
# argument of "any" can be used to remove all restrictions and permit any
# forwarding requests. An argument of "none" can be used to prohibit all
# forwarding requests. Wildcard "*" can be used for host or port to allow all
# hosts or all ports respectively. By default all port forwarding requests are
# permitted.
#sshd_PermitOpen: [any]

#
# GSS-API configuration
#

# Specifies whether to automatically destroy the user's credentials cache on
# logout. The default is "yes". Note that this option applies to protocol
# version 2 only.
#sshd_GSSAPICleanupCredentials: 'no'

# Determines whether to be strict about the identity of the GSSAPI acceptor a
# client authenticates against. If "yes" then the client must authenticate
# against the host service on the current hostname. If "no" then the client may
# authenticate against any service key stored in the machine's default store.
# This facility is provided to assist with operation on multi homed machines.
# The default is "yes". Note that this option applies only to protocol version
# 2 GSSAPI connections, and setting it to "no" may only work with recent
# Kerberos GSSAPI libraries.
#sshd_GSSAPIStrictAcceptorCheck: 'yes'

# Specifies whether key exchange based on GSSAPI is allowed. GSSAPI key exchange
# doesn't rely on ssh keys to verify host identity. The default is "no". Note
# that this option applies to protocol version 2 only.
#sshd_GSSAPIKeyExchange: 'no'

# Specifies whether to look at .k5users file for GSSAPI authentication access
# control. Further details are described in ksu(1). The default is "no".
#sshd_GSSAPIEnablek5users: 'no'

# Controls whether the user's GSSAPI credentials should be updated following a
# successful connection rekeying. This option can be used to accepted renewed or
# updated credentials from a compatible client. The default is "no".
#sshd_GSSAPIStoreCredentialsOnRekey: 'no'

# The list of key exchange algorithms that are accepted by GSSAPI key exchange.
# Possible values are
#
#    ss-gex-sha1-,
#    ss-group1-sha1-,
#    ss-group14-sha1-
#
# The default is "gss-gex-sha1-,gss-group1-sha1-,gss-group14-sha1-". This
# option only applies to protocol version 2 connections using GSSAPI.
#sshd_GSSAPIKexAlgorithms: gss-gex-sha1-,gss-group1-sha1-,gss-group14-sha1-

#
# Kerberos configuration
#

# If password authentication through Kerberos fails then the password will be
# validated via any additional local mechanism such as /etc/passwd. The default
# is "yes".
#sshd_KerberosOrLocalPasswd: 'yes'

# Specifies whether to automatically destroy the user's ticket cache file on
# logout. The default is "yes".
#sshd_KerberosTicketCleanup: 'yes'

# Specifies whether to look at .k5login file for user's aliases. The default is
# "yes".
#sshd_KerberosUseKuserok: 'yes'

#
# Allow/Deny Users/Groups
#

# This keyword can be followed by a list of group name patterns, separated by
# spaces. If specified, login is allowed only for users whose primary group or
# supplementary group list matches one of the patterns. Only group names are
# valid; a numerical group ID is not recognized. By default, login is allowed
# for all groups. The allow/deny directives are processed in the following
# order: DenyUsers, AllowUsers, DenyGroups, and finally AllowGroups. All of the
# specified user and group tests must succeed, before user is allowed to log in.
#sshd_AllowGroups: []

# This keyword can be followed by a list of user name patterns, separated by
# spaces. If specified, login is allowed only for user names that match one of
# the patterns. Only user names are valid; a numerical user ID is not
# recognized. By default, login is allowed for all users. If the pattern takes
# the form USER@HOST then USER and HOST are separately checked, restricting
# logins to particular users from particular hosts. The allow/deny directives
# are processed in the following order: DenyUsers, AllowUsers, DenyGroups, and
# finally AllowGroups. All of the specified user and group tests must succeed,
# before user is allowed to log in.
#sshd_AllowUsers: []

# This keyword can be followed by a list of group name patterns, separated by
# spaces. Login is disallowed for users whose primary group or supplementary
# group list matches one of the patterns. Only group names are valid; a
# numerical group ID is not recognized. By default, login is allowed for all
# groups. The allow/deny directives are processed in the following order:
# DenyUsers, AllowUsers, DenyGroups, and finally AllowGroups. All of the
# specified user and group tests must succeed, before user is allowed to log in.
#sshd_DenyGroups: []

# This keyword can be followed by a list of user name patterns, separated by
# spaces. Login is disallowed for user names that match one of the patterns.
# Only user names are valid; a numerical user ID is not recognized. By default,
# login is allowed for all users. If the pattern takes the form USER@HOST then
# USER and HOST are separately checked, restricting logins to particular users
# from particular hosts. The allow/deny directives are processed in the
# following order: DenyUsers, AllowUsers, DenyGroups, and finally AllowGroups.
# All of the specified user and group tests must succeed, before user is allowed
# to log in.
#sshd_DenyUsers: []

#
# Users login and Sessions
#

# Specifies the maximum number of authentication attempts permitted per
# connection. Once the number of failures reaches half this value, additional
# failures are logged. The default is 6.
#sshd_MaxAuthTries: 6

# Specifies the maximum number of open sessions permitted per network
# connection. The default is 10.
#sshd_MaxSessions: 10

# Specifies the maximum number of concurrent unauthenticated connections to the
# SSH daemon. Additional connections will be dropped until authentication
# succeeds or the LoginGraceTime expires for a connection. The default is
# 10:30:100.
#
# Alternatively, random early drop can be enabled by specifying the three colon
# separated values "start:rate:full" (e.g. "10:30:60"). sshd(8) will refuse
# connection attempts with a probability of "rate/100" (30%) if there are
# currently "start" (10) unauthenticated connections. The probability increases
# linearly and all connection attempts are refused if the number of
# unauthenticated connections reaches "full" (60).
#sshd_MaxStartups: 10:30:100

# Optionally specifies additional text to append to the SSH protocol banner sent
# by the server upon connection. The default is "none".
#sshd_VersionAddendum: 'none'

# The server disconnects after this time if the user has not successfully logged
# in. If the value is 0, there is no time limit. The default is 120 seconds.
#sshd_LoginGraceTime: '2m'

# The contents of the specified file are sent to the remote user before
# authentication is allowed. If the argument is "none" then no banner is
# displayed. This option is only available for protocol version 2. By default,
# no banner is displayed.
#sshd_Banner: none

# Specifies whether sshd(8) should print the date and time of the last user
# login when a user logs in interactively. The default is "yes".
#sshd_PrintLastLog: 'no'

# Specifies whether sshd(8) should print /etc/motd when a user logs in
# interactively. (On some systems it is also printed by the shell,
# /etc/profile, or equivalent.) The default is "yes".
#sshd_PrintMotd: 'no'

# Specifies whether login(1) is used for interactive login sessions. The
# default is "no". Note that login(1) is never used for remote command
# execution. Note also, that if this is enabled, X11Forwarding will be dis‐
# abled because login(1) does not know how to handle xauth(1) cookies. If
# UsePrivilegeSeparation is specified, it will be disabled after authentication.
#sshd_UseLogin: 'no'

#
# X11 configuration
#

# Specifies the first display number available for sshd(8)'s X11 forwarding.
# This prevents sshd from interfering with real X11 servers. The default is 10.
#sshd_X11DisplayOffset: 10

# Specifies whether sshd(8) should bind the X11 forwarding server to the
# loopback address or to the wildcard address. By default, sshd binds the
# forwarding server to the loopback address and sets the hostname part of the
# DISPLAY environment variable to "localhost". This prevents remote hosts from
# connecting to the proxy display. However, some older X11 clients may not
# function with this configuration. X11UseLocalhost may be set to "no" to
# specify that the forwarding server should be bound to the wildcard address.
# The argument must be "yes" or "no". The default is "yes".
#sshd_X11UseLocalhost: 'yes'

# Specifies the maximum number of displays available for sshd(8)'s X11
# forwarding. This prevents sshd from exhausting local ports. The default is
# 1000.
#sshd_X11MaxDisplays: 1000

#
# Subsystems
#

# Configures an external subsystem (e.g. file transfer daemon). Arguments
# should be a subsystem name and a command (with optional arguments) to execute
# upon subsystem request.
#
# The command sftp-server(8) implements the "sftp" file transfer subsystem.
#
# Alternately the name "internal-sftp" implements an in-process "sftp" server.
# This may simplify configurations using ChrootDirectory to force a different
# filesystem root on clients.
#
# By default no subsystems are defined. Note that this option applies to
# protocol version 2 only.
#sshd_Subsystem:
# - name: sftp
#   bin: /usr/libexec/openssh/sftp-server

#
# Conditional blocks
#

# Introduces a conditional block. If all of the criteria on the Match line are
# satisfied, the keywords on the following lines override those set in the
# global section of the config file, until either another Match line or the end
# of the file. If a keyword appears in multiple Match blocks that are
# satisified, only the first instance of the keyword is applied.
#
# The arguments to Match are one or more criteria-pattern pairs or the single
# token All which matches all criteria. The available criteria are User, Group,
# Host, LocalAddress, LocalPort, and Address. The match pat‐ terns may consist
# of single entries or comma-separated lists and may use the wildcard and
# negation operators described in the PATTERNS section of ssh_config(5).
#
# The patterns in an Address criteria may additionally contain addresses to
# match in CIDR address/masklen format, e.g. "192.0.2.0/24" or "3ffe:ffff::/32".
# Note that the mask length provided must be consistent with the address - it is
# an error to specify a mask length that is too long for the address or one with
# bits set in this host portion of the address. For example, "192.0.2.0/33" and
# "192.0.2.0/8" respectively.
#
# Only a subset of keywords may be used on the lines following a Match keyword.
# Available keywords are AcceptEnv, AllowAgentForwarding, AllowGroups,
# AllowTcpForwarding, AllowUsers, AuthenticationMethods, AuthorizedKeysCommand,
# AuthorizedKeysCommandUser, AuthorizedKeysFile, AuthorizedPrincipalsFile,
# Banner, ChrootDirectory, DenyGroups, DenyUsers, ForceCommand, GatewayPorts,
# GSSAPIAuthentication, HostbasedAuthentication,
# HostbasedUsesNameFromPacketOnly, KbdInteractiveAuthentication,
# KerberosAuthentication, KerberosUseKuserok, MaxAuthTries, MaxSessions,
# PasswordAuthentication, PermitEmptyPasswords, PermitOpen, PermitRootLogin,
# PermitTTY, PermitTunnel, PubkeyAuthentication, RekeyLimit,
# RhostsRSAAuthentication, RSAAuthentication, X11DisplayOffset, X11MaxDisplays,
# X11Forwarding and X11UseLocalHost.
#sshd_Matches:
# - user: my_user
#   address: my_address
#   keywords:
#     PasswordAuthentication: 'no'
#     ...


## SSH client configuration. See man ssh_config. ##


#
# General Behaviour
#

# Gives the verbosity level that is used when logging messages from ssh(1).
# The possible values are: QUIET, FATAL, ERROR, INFO, VERBOSE, DEBUG, DEBUG1,
# DEBUG2, and DEBUG3. The default is INFO. DEBUG and DEBUG1 are equivalent.
# DEBUG2 and DEBUG3 each specify higher levels of verbose output.
#ssh_LogLevel: INFO

# If set to "yes", passphrase/password querying will be disabled. This
# option is useful in scripts and other batch jobs where no user is present
# to supply the password. The argument must be "yes" or "no". The default
# is "no".
#ssh_BatchMode: 'no'

# Specifies the protocol versions ssh(1) should support in order of
# preference. The possible values are '1' and '2'. Multiple versions must
# be comma-separated. When this option is set to "2,1" ssh will try version
# 2 and fall back to version 1 if version 2 is not available. The default is
# '2'.
ssh_Protocol: 2

# Specifies the real host name to log into. This can be used to specify
# nicknames or abbreviations for hosts. If the hostname contains the
# character sequence '%h', then this will be replaced with the host name
# speci‐ fied on the command line (this is useful for manipulating
# unqualified names). The default is the name given on the command line.
# Numeric IP addresses are also permitted (both on the command line and in
# HostName specifications).
#ssh_HostName: '%h'

# Sets the escape character (default: '~'). The escape character can also be
# set on the command line. The argument should be a single character, '^'
# followed by a letter, or "none" to disable the escape character entirely
# (making the connection transparent for binary data).
#ssh_EscapeChar: ~

#
# Network configuration
#

# Specifies which address family to use when connecting. Valid arguments are
# "any", "inet" (use IPv4 only), or "inet6" (use IPv6 only).
ssh_AddressFamily: inet

# Use the specified address on the local machine as the source address of the
# connection. Only useful on systems with more than one address. Note that
# this option does not work if UsePrivilegedPort is set to "yes".
#ssh_BindAddress: 0.0.0.0

# Specifies the port number to connect on the remote host. The default is 22.
ssh_Port: 22

# Specifies the number of tries (one per second) to make before exiting. The
# argument must be an integer. This may be useful in scripts if the
# connection sometimes fails. The default is 1.
#ssh_ConnectionAttempts: 1

# Specifies the timeout (in seconds) used when connecting to the SSH server,
# instead of using the default system TCP timeout. This value is used only
# when the target is down or really unreachable, not when it refuses the
# connection.
#ssh_ConnectTimeout: 0

# Specifies whether to use compression. The argument must be "yes" or "no".
# The default is "no".
#ssh_Compression: 'no'

# Specifies the compression level to use if compression is enabled. The
# argument must be an integer from 1 (fast) to 9 (slow, best). The default
# level is 6, which is good for most applications. The meaning of the values
# is the same as in gzip(1). Note that this option applies to protocol
# version 1 only.
#ssh_CompressionLevel: 6

# Enables the sharing of multiple sessions over a single network connection.
# When set to "yes", ssh(1) will listen for connections on a control socket
# specified using the ControlPath argument. Additional sessions can connect
# to this socket using the same ControlPath with ControlMaster set to "no"
# (the default). These sessions will try to reuse the master instance's
# network connection rather than initiating new ones, but will fall back to
# connecting normally if the control socket does not exist, or is not
# listening.
#
# Setting this to "ask" will cause ssh to listen for control connections, but
# require confirmation using the SSH_ASKPASS program before they are accepted
# (see ssh-add(1) for details). If the ControlPath cannot be opened, ssh
# will continue without connecting to a master instance.
#
# X11 and ssh-agent(1) forwarding is supported over these multiplexed
# connections, however the display and agent forwarded will be the one
# belonging to the master connection i.e. it is not possible to forward
# multiple displays or agents.
#
# Two additional options allow for opportunistic multiplexing: try to use a
# master connection but fall back to creating a new one if one does not
# already exist. These options are: "auto" and "autoask". The latter
# requires confirmation like the "ask" option.
ssh_ControlMaster: auto

# Specify the path to the control socket used for connection sharing as
# described in the ControlMaster section above or the string "none" to
# disable connection sharing. In the path, '%L' will be substituted by the
# first component of the local host name, '%l' will be substituted by the
# local host name (including any domain name), '%h' will be substituted by
# the target host name, '%n' will be substituted by the original target host
# name specified on the command line, '%p' the destination port, '%r' by the
# remote login username, and '%u' by the username of the user running ssh(1).
# It is recommended that any ControlPath used for opportunis‐ tic connection
# sharing include at least %h, %p, and %r. This ensures that shared
# connections are uniquely identified.
#ssh_ControlPath: ''

# When used in conjunction with ControlMaster, specifies that the master
# connection should remain open in the background (waiting for future client
# connections) after the initial client connection has been closed. If set
# to "no", then the master connection will not be placed into the background,
# and will close as soon as the initial client connection is closed. If set
# to "yes", then the master connection will remain in the back‐ ground
# indefinitely (until killed or closed via a mechanism such as the ssh(1) "-O
# exit" option). If set to a time in seconds, or a time in any of the
# formats documented in sshd_config(5), then the backgrounded mas‐ ter
# connection will automatically terminate after it has remained idle (with no
# client connections) for the specified time.
#ssh_ControlPersist: 15m

# Specifies the IPv4 type-of-service or DSCP class for connections. Accepted
# values are "af11", "af12", "af13", "af21", "af22", "af23", "af31", "af32",
# "af33", "af41", "af42", "af43", "cs0", "cs1", "cs2", "cs3", "cs4", "cs5",
# "cs6", "cs7", "ef", "lowdelay", "throughput", "reliability", or a numeric
# value. This option may take one or two arguments, separated by whitespace.
# If one argument is specified, it is used as the packet class
# unconditionally. If two values are specified, the first is automatically
# selected for interactive sessions and the second for non-interactive
# sessions. The default is "lowdelay" for interactive sessions and
# "throughput" for non-interactive sessions.
#ssh_IPQoS: lowdelay

# Specifies whether the system should send TCP keepalive messages to the other
# side. If they are sent, death of the connection or crash of one of the
# machines will be properly noticed. However, this means that connections
# will die if the route is down temporarily, and some people find it annoying.
#
# The default is "yes" (to send TCP keepalive messages), and the client will
# notice if the network goes down or the remote host dies. This is important
# in scripts, and many users want it too.
#
# To disable TCP keepalive messages, the value should be set to "no".
#ssh_TCPKeepAlive: 'yes'

# Sets the number of server alive messages (see below) which may be sent
# without ssh(1) receiving any messages back from the server. If this
# threshold is reached while server alive messages are being sent, ssh will
# disconnect from the server, terminating the session. It is important to
# note that the use of server alive messages is very different from
# TCPKeepAlive (below). The server alive messages are sent through the
# encrypted channel and therefore will not be spoofable. The TCP keepalive
# option enabled by TCPKeepAlive is spoofable. The server alive mechanism is
# valuable when the client or server depend on knowing when a connec‐ tion has
# become inactive.
#
# The default value is 3. If, for example, ServerAliveInterval (see below) is
# set to 15 and ServerAliveCountMax is left at the default, if the server
# becomes unresponsive, ssh will disconnect after approximately 45 seconds.
# This option applies to protocol version 2 only.
#ssh_ServerAliveCountMax: 3

# Sets a timeout interval in seconds after which if no data has been received
# from the server, ssh(1) will send a message through the encrypted channel to
# request a response from the server. The default is 0, indicat‐ ing that
# these messages will not be sent to the server. This option applies to
# protocol version 2 only.
#ssh_ServerAliveInterval: 0

# Specifies whether to use a privileged port for outgoing connections. The
# argument must be "yes" or "no". The default is "no". If set to "yes",
# ssh(1) must be setuid root. Note that this option must be set to "yes" for
# RhostsRSAAuthentication with older servers.
#ssh_UsePrivilegedPort: 'no'

# Specifies the command to use to connect to the server. The command string
# extends to the end of the line, and is executed with the user's shell. In
# the command string, any occurrence of '%h' will be substituted by the host
# name to connect, '%p' by the port, and '%r' by the remote user name. The
# command can be basically anything, and should read from its standard input
# and write to its standard output. It should eventually connect an sshd(8)
# server running on some machine, or execute sshd -i somewhere. Host key
# management will be done using the HostName of the host being connected
# (defaulting to the name typed by the user). Setting the command to "none"
# disables this option entirely. Note that CheckHostIP is not available for
# connects with a proxy command.
#
# This directive is useful in conjunction with nc(1) and its proxy support.
# For example, the following directive would connect via an HTTP proxy at
# 192.0.2.0:
#
# ProxyCommand /usr/bin/nc -X connect -x 192.0.2.0:8080 %h %p
#ssh_ProxyCommand: ''

# Specifies that ProxyCommand will pass a connected file descriptor back to
# ssh(1) instead of continuing to execute and pass data. The default is "no".
#ssh_ProxyUseFdpass: 'no'

#
# Authentication
#

# Specifies the order in which the client should try protocol 2 authentication
# methods. This allows a client to prefer one method (e.g. keyboard-
# interactive) over another method (e.g. password). The default is:
#
# gssapi-with-mic,hostbased,publickey,
# keyboard-interactive,password
#ssh_PreferredAuthentications: [publickey, keyboard-interactive, password]

# Specifies whether to try rhosts based authentication with public key
# authentication. The argument must be "yes" or "no". The default is "no".
# This option applies to protocol version 2 only and is similar to
# RhostsRSAAuthentication.
#ssh_HostbasedAuthentication: 'no'

# Specifies whether to use password authentication. The argument to this
# keyword must be "yes" or "no". The default is "yes".
#ssh_PasswordAuthentication: 'yes'

# Specifies whether to try rhosts based authentication with RSA host
# authentication. The argument must be "yes" or "no". The default is "no".
# This option applies to protocol version 1 only and requires ssh(1) to be
# setuid root.
#ssh_RhostsRSAAuthentication: 'no'

# Specifies whether to try RSA authentication. The argument to this keyword
# must be "yes" or "no". RSA authentication will only be attempted if the
# identity file exists, or an authentication agent is running. The default is
# "yes". Note that this option applies to protocol version 1 only.
#ssh_RSAAuthentication: 'yes'

# Specifies whether to try public key authentication. The argument to this
# keyword must be "yes" or "no". The default is "yes". This option applies
# to protocol version 2 only.
#ssh_PubkeyAuthentication: 'yes'

# Specifies whether user authentication based on GSSAPI is allowed. The
# default is "no". Note that this option applies to protocol version 2 only.
#ssh_GSSAPIAuthentication: 'no'

# Specifies the list of methods to use in keyboard-interactive
# authentication. Multiple method names must be comma-separated. The
# default is to use the server specified list. The methods available vary
# depending on what the server supports. For an OpenSSH server, it may be
# zero or more of: "bsdauth", "pam", and "skey".
#ssh_KbdInteractiveDevices: []

# Specifies whether to use keyboard-interactive authentication. The argument
# to this keyword must be "yes" or "no". The default is "yes".
#ssh_KbdInteractiveAuthentication: 'yes'

# Specifies whether to use challenge-response authentication. The argument
# to this keyword must be "yes" or "no". The default is "yes".
#ssh_ChallengeResponseAuthentication: 'yes'

# Specifies the full pathname of the xauth(1) program. The default is
# /usr/bin/xauth.
#ssh_XAuthLocation: /usr/bin/xauth

#
# Security
#

# If this flag is set to "yes", ssh(1) will additionally check the host IP
# address in the known_hosts file. This allows ssh to detect if a host key
# changed due to DNS spoofing. If the option is set to "no", the check will
# not be executed. The default is "yes".
#ssh_CheckHostIP: 'yes'

# Specifies whether to request a pseudo-tty for the session. The argument may
# be one of: "no" (never request a TTY), "yes" (always request a TTY when
# standard input is a TTY), "force" (always request a TTY) or "auto" (request
# a TTY when opening a login session). This option mirrors the -t and -T
# flags for ssh(1).
#ssh_RequestTTY: auto


# Specifies a pattern-list of unknown options to be ignored if they are
# encountered in configuration parsing. This may be used to suppress errors
# if ssh_config contains options that are unrecognised by ssh(1). It is
# recommended that IgnoreUnknown be listed early in the configuration file as
# it will not be applied to unknown options that appear before it.
#ssh_IgnoreUnknown: ''

# Setting this option to "yes" in the global client configuration file
# /etc/ssh/ssh_config enables the use of the helper program ssh-keysign(8)
# during HostbasedAuthentication. The argument must be "yes" or "no". The
# default is "no". This option should be placed in the non-hostspecific
# section. See ssh-keysign(8) for more information.
#ssh_EnableSSHKeysign: 'no'

# If this flag is set to "yes", ssh(1) will never automatically add host keys
# to the ~/.ssh/known_hosts file, and refuses to connect to hosts whose host
# key has changed. This provides maximum protection against trojan horse
# attacks, though it can be annoying when the /etc/ssh/ssh_known_hosts file is
# poorly maintained or when connections to new hosts are frequently made.
# This option forces the user to manually add all new hosts. If this flag is
# set to "no", ssh will automatically add new host keys to the user known
# hosts files. If this flag is set to "ask", new host keys will be added to
# the user known host files only after the user has con‐ firmed that is what
# they really want to do, and ssh will refuse to connect to hosts whose host
# key has changed. The host keys of known hosts will be verified
# automatically in all cases. The argument must be "yes", "no", or "ask".
# The default is "ask".
#ssh_StrictHostKeyChecking: ask

# This option can be used if the home directory is shared across machines.
# In this case localhost will refer to a different machine on each of the
# machines and the user will get many warnings about changed host keys.
# However, this option disables host authentication for localhost. The
# argument to this keyword must be "yes" or "no". The default is to check
# the host key for localhost.
#ssh_NoHostAuthenticationForLocalhost: 'yes'

#
# Host keys and Certificates
#

# Specifies that ssh(1) should only use the authentication identity files
# configured in the ssh_config files, even if ssh-agent(1) or a
# PKCS11Provider offers more identities. The argument to this keyword must
# be "yes" or "no". This option is intended for situations where ssh-agent
# offers many different identities. The default is "no".
#ssh_IdentitiesOnly: 'no'

# Specifies a file from which the user's DSA, ECDSA, ED25519 or RSA
# authentication identity is read. The default is ~/.ssh/identity for
# protocol version 1, and ~/.ssh/id_dsa, ~/.ssh/id_ecdsa, ~/.ssh/id_ed25519
# and ~/.ssh/id_rsa for protocol version 2. Additionally, any identities
# represented by the authentication agent will be used for authentication
# unless IdentitiesOnly is set. ssh(1) will try to load certificate informa‐
# tion from the filename obtained by appending -cert.pub to the path of a
# specified IdentityFile.
#
# The file name may use the tilde syntax to refer to a user's home directory
# or one of the following escape characters: '%d' (local user's home
# directory), '%u' (local user name), '%l' (local host name), '%h' (remote
# host name) or '%r' (remote user name).
#
# It is possible to have multiple identity files specified in configuration
# files; all these identities will be tried in sequence. Multiple
# IdentityFile directives will add to the list of identities tried (this
# behaviour differs from that of other configuration directives).
#
# IdentityFile may be used in conjunction with IdentitiesOnly to select which
# identities in an agent are offered during authentication.
ssh_IdentityFile: "{{ ssh_identity_files }}"

# Specifies whether to verify the remote key using DNS and SSHFP resource
# records. If this option is set to "yes", the client will implicitly trust
# keys that match a secure fingerprint from DNS. Insecure fingerprints will
# be handled as if this option was set to "ask". If this option is set to
# "ask", information on fingerprint match will be displayed, but the user will
# still need to confirm new host keys according to the StrictHostKeyChecking
# option. The argument must be "yes", "no", or "ask". The default is "no".
# Note that this option applies to protocol version 2 only.
#
# See also VERIFYING HOST KEYS in ssh(1).
#ssh_VerifyHostKeyDNS: 'no'

# If this flag is set to "yes", an ASCII art representation of the remote host
# key fingerprint is printed in addition to the hex fingerprint string at
# login and for unknown host keys. If this flag is set to "no", no
# fingerprint strings are printed at login and only the hex fingerprint string
# will be printed for unknown host keys. The default is "no".
#ssh_VisualHostKey: 'no'

# Specifies an alias that should be used instead of the real host name when
# looking up or saving the host key in the host key database files. This
# option is useful for tunneling SSH connections or for multiple servers
# running on a single host.
#ssh_HostKeyAlias: ''

# Specifies the maximum amount of data that may be transmitted before the
# session key is renegotiated, optionally followed a maximum amount of time
# that may pass before the session key is renegotiated. The first argu‐ ment
# is specified in bytes and may have a suffix of 'K', 'M', or 'G' to indicate
# Kilobytes, Megabytes, or Gigabytes, respectively. The default is between
# '1G' and '4G', depending on the cipher. The optional second value is
# specified in seconds and may use any of the units documented in the TIME
# FORMATS section of sshd_config(5). The default value for RekeyLimit is
# "default none", which means that rekeying is performed after the cipher's
# default amount of data has been sent or received and no time based rekeying
# is done. This option applies to protocol version 2 only.
#ssh_RekeyLimit: 'default none'

# Specifies which PKCS#11 provider to use. The argument to this keyword is
# the PKCS#11 shared library ssh(1) should use to communicate with a PKCS#11
# token providing the user's private RSA key.
#ssh_PKCS11Provider: ''

# Specifies the user to log in as. This can be useful when a different user
# name is used on different machines. This saves the trouble of having to
# remember to give the user name on the command line.
#ssh_User:

#
# Known hosts
#

# Specifies one or more files to use for the user host key database, separated
# by whitespace. The default is ~/.ssh/known_hosts, ~/.ssh/known_hosts2.
ssh_UserKnownHostsFile: "{{ ssh_knownhosts_files }}"

# Specifies one or more files to use for the global host key database,
# separated by whitespace. The default is /etc/ssh/ssh_known_hosts,
# /etc/ssh/ssh_known_hosts2.
ssh_GlobalKnownHostsFile: "{{ ssh_config_path }}/ssh_known_hosts"

# Indicates that ssh(1) should hash host names and addresses when they are
# added to ~/.ssh/known_hosts. These hashed names may be used normally by
# ssh(1) and sshd(8), but they do not reveal identifying information should
# the file's contents be disclosed. The default is "no". Note that existing
# names and addresses in known hosts files will not be converted
# automatically, but may be manually hashed using ssh-keygen(1).
#ssh_HashKnownHosts: 'no'

#
# Users login
#

# Specifies a command to execute on the local machine after successfully
# connecting to the server. The command string extends to the end of the
# line, and is executed with the user's shell. The following escape
# character substitutions will be performed: '%d' (local user's home
# directory), '%h' (remote host name), '%l' (local host name), '%n' (host
# name as provided on the command line), '%p' (remote port), '%r' (remote
# user name) or '%u' (local user name).
#
# The command is run synchronously and does not have access to the session of
# the ssh(1) that spawned it. It should not be used for interactive
# commands.
#
# This directive is ignored unless PermitLocalCommand has been enabled.
#ssh_LocalCommand: ''

# Allow local command execution via the LocalCommand option or using the
# !command escape sequence in ssh(1). The argument must be "yes" or "no".
# The default is "no".
#ssh_PermitLocalCommand: 'no'

# Specifies the number of password prompts before giving up. The argument to
# this keyword must be an integer. The default is 3.
#ssh_NumberOfPasswordPrompts: 3

# Specifies what variables from the local environ(7) should be sent to the
# server. Note that environment passing is only supported for protocol 2.
# The server must also support it, and the server must be configured to accept
# these environment variables. Note that the TERM environment variable is
# always sent whenever a pseudo-terminal is requested as it is required by the
# protocol. Refer to AcceptEnv in sshd_config(5) for how to configure the
# server. Variables are specified by name, which may contain wildcard
# characters. Multiple environment variables may be separated by whitespace
# or spread across multiple SendEnv directives. The default is not to send
# any environment variables.
#
# See PATTERNS for more information on patterns.
ssh_SendEnv: [
  LANG, LC_CTYPE, LC_NUMERIC, LC_TIME, LC_COLLATE, LC_MONETARY, LC_MESSAGES,
  LC_PAPER, LC_NAME, LC_ADDRESS, LC_TELEPHONE, LC_MEASUREMENT,
  LC_IDENTIFICATION, LC_ALL, LANGUAGE, XMODIFIERS ]

#
# Ciphers and hashing algorithms
#

# Specifies the cipher to use for encrypting the session in protocol version
# 1. Currently, "blowfish", "3des", and "des" are supported. des is only
# supported in the ssh(1) client for interoperability with legacy protocol 1
# implementations that do not support the 3des cipher. Its use is strongly
# discouraged due to cryptographic weaknesses. The default is "3des".
#ssh_Cipher: '3des'

# Specifies the ciphers allowed for protocol version 2 in order of
# preference. Multiple ciphers must be comma-separated. The supported
# ciphers are:
#
# "3des-cbc", "aes128-cbc", "aes192-cbc", "aes256-cbc", "aes128-ctr",
# "aes192-ctr", "aes256-ctr", "aes128-gcm@openssh.com", "aes256-gcm@openssh.com",
# "arcfour128", "arcfour256", "arcfour", "blowfish-cbc", "cast128-cbc", and
# "chacha20-poly1305@openssh.com".
#
# The list of available ciphers may also be obtained using the -Q option of
# ssh(1).
#ssh_Ciphers: [
#  aes128-ctr, aes192-ctr, aes256-ctr, arcfour256, arcfour128,
#  aes128-gcm@openssh.com, aes256-gcm@openssh.com,
#  chacha20-poly1305@openssh.com, aes128-cbc, 3des-cbc, blowfish-cbc,
#  cast128-cbc, aes192-cbc, aes256-cbc, arcfour ]

# Specifies the protocol version 2 host key algorithms that the client wants
# to use in order of preference. If hostkeys are known for the destination
# host then this default is modified to prefer their algorithms.
#ssh_HostKeyAlgorithms: [
#  ecdsa-sha2-nistp256-cert-v01@openssh.com, ecdsa-sha2-nistp384-cert-v01@openssh.com,
#  ecdsa-sha2-nistp521-cert-v01@openssh.com, ssh-ed25519-cert-v01@openssh.com,
#  ssh-rsa-cert-v01@openssh.com, ssh-dss-cert-v01@openssh.com,
#  ssh-rsa-cert-v00@openssh.com, ssh-dss-cert-v00@openssh.com, ecdsa-sha2-nistp256,
#  ecdsa-sha2-nistp384, ecdsa-sha2-nistp521, ssh-ed25519, ssh-rsa, ssh-dss ]

# Specifies the available KEX (Key Exchange) algorithms. Multiple algorithms
# must be comma-separated.
#ssh_KexAlgorithms: [
#  curve25519-sha256@libssh.org, ecdh-sha2-nistp256, ecdh-sha2-nistp384,
#  ecdh-sha2-nistp521, diffie-hellman-group-exchange-sha256,
#  diffie-hellman-group-exchange-sha1, diffie-hellman-group14-sha1,
#  diffie-hellman-group1-sha1 ]

# Specifies the MAC (message authentication code) algorithms in order of
# preference. The MAC algorithm is used in protocol version 2 for data
# integrity protection. Multiple algorithms must be comma-separated. The
# algorithms that contain "-etm" calculate the MAC after encryption (encrypt-
# then-mac). These are considered safer and their use recommended.
#ssh_MACs: [
#  hmac-md5-etm@openssh.com, hmac-sha1-etm@openssh.com, umac-64-etm@openssh.com,
#  umac-128-etm@openssh.com, hmac-sha2-256-etm@openssh.com,
#  hmac-sha2-512-etm@openssh.com, hmac-ripemd160-etm@openssh.com,
#  hmac-sha1-96-etm@openssh.com, hmac-md5-96-etm@openssh.com, hmac-md5,
#  hmac-sha1, umac-64@openssh.com, umac-128@openssh.com, hmac-sha2-256,
#  hmac-sha2-512, hmac-ripemd160, hmac-sha1-96, hmac-md5-96 ]

# Specifies the protocol version 2 host key algorithms that the client wants
# to use in order of preference. If hostkeys are known for the destination
# host then this default is modified to prefer their algorithms.
#ssh_GSSAPIKexAlgorithms: [
#  ecdsa-sha2-nistp256-cert-v01@openssh.com,
#  ecdsa-sha2-nistp384-cert-v01@openssh.com,
#  ecdsa-sha2-nistp521-cert-v01@openssh.com,
#  ssh-ed25519-cert-v01@openssh.com, ssh-rsa-cert-v01@openssh.com,
#  ssh-dss-cert-v01@openssh.com, ssh-rsa-cert-v00@openssh.com,
#  ssh-dss-cert-v00@openssh.com, ecdsa-sha2-nistp256, ecdsa-sha2-nistp384,
#  ecdsa-sha2-nistp521, ssh-ed25519, ssh-rsa, ssh-dss ]

#
# Forwarding
#

# Specifies that all local, remote, and dynamic port forwardings specified in
# the configuration files or on the command line be cleared. This option is
# primarily useful when used from the ssh(1) command line to clear port
# forwardings set in configuration files, and is automatically set by scp(1)
# and sftp(1). The argument must be "yes" or "no". The default is "no".
#ssh_ClearAllForwardings: 'no'

# Specifies that a TCP port on the local machine be forwarded over the secure
# channel, and the application protocol is then used to determine where to
# connect to from the remote machine.
#
# The argument must be [bind_address:]port. IPv6 addresses can be specified
# by enclosing addresses in square brackets. By default, the local port is
# bound in accordance with the GatewayPorts setting. However, an explicit
# bind_address may be used to bind the connection to a specific address. The
# bind_address of "localhost" indicates that the listening port be bound for
# local use only, while an empty address or '*' indicates that the port
# should be available from all interfaces.
#
# Currently the SOCKS4 and SOCKS5 protocols are supported, and ssh(1) will
# act as a SOCKS server. Multiple forwardings may be specified, and
# additional forwardings can be given on the command line. Only the
# superuser can forward privileged ports.
#ssh_DynamicForward: []

# Specifies that a TCP port on the local machine be forwarded over the secure
# channel to the specified host and port from the remote machine. The first
# argument must be [bind_address:]port and the second argument must be
# host:hostport. IPv6 addresses can be specified by enclosing addresses in
# square brackets. Multiple forwardings may be specified, and additional
# forwardings can be given on the command line. Only the superuser can
# forward privileged ports. By default, the local port is bound in
# accordance with the GatewayPorts setting. However, an explicit
# bind_address may be used to bind the connection to a specific address. The
# bind_address of "localhost" indicates that the listening port be bound for
# local use only, while an empty address or '*' indicates that the port
# should be available from all interfaces.
#ssh_LocalForward: []

# Specifies that a TCP port on the remote machine be forwarded over the secure
# channel to the specified host and port from the local machine. The first
# argument must be [bind_address:]port and the second argument must be
# host:hostport. IPv6 addresses can be specified by enclosing addresses in
# square brackets. Multiple forwardings may be specified, and additional
# forwardings can be given on the command line. Privileged ports can be
# forwarded only when logging in as root on the remote machine.
#
# If the port argument is '0', the listen port will be dynamically allocated
# on the server and reported to the client at run time.
#
# If the bind_address is not specified, the default is to only bind to
# loopback addresses. If the bind_address is '*' or an empty string, then the
# forwarding is requested to listen on all interfaces. Specifying a remote
# bind_address will only succeed if the server's GatewayPorts option is
# enabled (see sshd_config(5)).
#ssh_RemoteForward: []

# Specifies whether ssh(1) should terminate the connection if it cannot set
# up all requested dynamic, tunnel, local, and remote port forwardings. The
# argument must be "yes" or "no". The default is "no".
#ssh_ExitOnForwardFailure: 'no'

# Specifies whether the connection to the authentication agent (if any) will
# be forwarded to the remote machine. The argument must be "yes" or "no".
# The default is "no".
#
# Agent forwarding should be enabled with caution. Users with the ability to
# bypass file permissions on the remote host (for the agent's Unix-domain
# socket) can access the local agent through the forwarded connection. An
# attacker cannot obtain key material from the agent, however they can
# perform operations on the keys that enable them to authenticate using the
# identities loaded into the agent.
#ssh_ForwardAgent: 'no'

# Specifies whether keys should be automatically added to a running ssh-agent.
# If this option is set to yes and a key is loaded from a file, the key and
# its passphrase are added to the agent with the default lifetime, as if by
# ssh-add(1).  If this option is set to ask, ssh(1) will require confirmation
# using the SSH_ASKPASS program before adding a key (see ssh-add(1) for
# details).  If this option is set to confirm, each use of the key must be
# confirmed, as if the -c option was specified to ssh-add(1). If this option is
# set to no, no keys are added to the agent. The argument must be yes, confirm,
# ask, or no (the default).
#ssh_AddKeysToAgent: 'no'

# Specifies whether X11 connections will be automatically redirected over the
# secure channel and DISPLAY set. The argument must be "yes" or "no". The
# default is "no".
#
# X11 forwarding should be enabled with caution. Users with the ability to
# bypass file permissions on the remote host (for the user's X11
# authorization database) can access the local X11 display through the
# forwarded connection. An attacker may then be able to perform activities
# such as keystroke monitoring if the ForwardX11Trusted option is also
# enabled.
#ssh_ForwardX11: 'no'

# Specify a timeout for untrusted X11 forwarding using the format described
# in the TIME FORMATS section of sshd_config(5). X11 connections received by
# ssh(1) after this time will be refused. The default is to disable
# untrusted X11 forwarding after twenty minutes has elapsed.
#ssh_ForwardX11Timeout: 20m

# If this option is set to "yes", remote X11 clients will have full access to
# the original X11 display.
#
# If this option is set to "no", remote X11 clients will be considered
# untrusted and prevented from stealing or tampering with data belonging to
# trusted X11 clients. Furthermore, the xauth(1) token used for the session
# will be set to expire after 20 minutes. Remote clients will be refused
# access after this time.
#
# The default is "no".
#
# See the X11 SECURITY extension specification for full details on the
# restrictions imposed on untrusted clients.
#ssh_ForwardX11Trusted: 'no'

# Specifies whether remote hosts are allowed to connect to local forwarded
# ports. By default, ssh(1) binds local port forwardings to the loopback
# address. This prevents other remote hosts from connecting to forwarded
# ports. GatewayPorts can be used to specify that ssh should bind local port
# forwardings to the wildcard address, thus allowing remote hosts to connect
# to forwarded ports. The argument must be "yes" or "no". The default is
# "no".
#ssh_GatewayPorts: 'no'

# Request tun(4) device forwarding between the client and the server. The
# argument must be "yes", "point-to-point" (layer 3), "ethernet" (layer 2), or
# "no". Specifying "yes" requests the default tunnel mode, which is "point-
# to-point". The default is "no".
#ssh_Tunnel: 'no'

# Specifies the tun(4) devices to open on the client (local_tun) and the
# server (remote_tun).
#
# The argument must be local_tun[:remote_tun]. The devices may be specified
# by numerical ID or the keyword "any", which uses the next available tunnel
# device. If remote_tun is not specified, it defaults to "any". The default
# is "any:any".
#ssh_TunnelDevice: any:any

#
# Domain Names management
#

# When CanonicalizeHostname is enabled, this option specifies the list of
# domain suffixes in which to search for the specified destination host.
#ssh_CanonicalDomains: ''

# Specifies whether to fail with an error when hostname canonicalization
# fails. The default, "yes", will attempt to look up the unqualified
# hostname using the system resolver's search rules. A value of "no" will
# cause ssh(1) to fail instantly if CanonicalizeHostname is enabled and the
# target hostname cannot be found in any of the domains specified by
# CanonicalDomains.
#ssh_CanonicalizeFallbackLocal: 'yes'

# Controls whether explicit hostname canonicalization is performed. The
# default, "no", is not to perform any name rewriting and let the system
# resolver handle all hostname lookups. If set to "yes" then, for connec‐
# tions that do not use a ProxyCommand, ssh(1) will attempt to canonicalize
# the hostname specified on the command line using the CanonicalDomains
# suffixes and CanonicalizePermittedCNAMEs rules. If CanonicalizeHostname is
# set to "always", then canonicalization is applied to proxied connections
# too.
#
# If this option is enabled and canonicalisation results in the target
# hostname changing, then the configuration files are processed again using
# the new target name to pick up any new configuration in matching Host
# stanzas.
#ssh_CanonicalizeHostname: 'no'

# Specifies the maximum number of dot characters in a hostname before
# canonicalization is disabled. The default, "1", allows a single dot (i.e.
# hostname.subdomain).
#ssh_CanonicalizeMaxDots: 1

# Specifies rules to determine whether CNAMEs should be followed when
# canonicalizing hostnames. The rules consist of one or more arguments of
# source_domain_list:target_domain_list, where source_domain_list is a pat‐
# tern-list of domains that may follow CNAMEs in canonicalization, and
# target_domain_list is a pattern-list of domains that they may resolve to.
#
# For example, "*.a.example.com:*.b.example.com,*.c.example.com" will allow
# hostnames matching "*.a.example.com" to be canonicalized to names in the
# "*.b.example.com" or "*.c.example.com" domains.
#ssh_CanonicalizePermittedCNAMEs: []

#
# GSS-API Configuration
#

# Forward (delegate) credentials to the server. The default is "no". Note
# that this option applies to protocol version 2 connections using GSSAPI.
#ssh_GSSAPIDelegateCredentials: 'no'

# Specifies whether key exchange based on GSSAPI may be used. When using
# GSSAPI key exchange the server need not have a host key. The default is
# "no". Note that this option applies to protocol version 2 only.
#ssh_GSSAPIKeyExchange: 'no'

# If set, specifies the GSSAPI client identity that ssh should use when
# connecting to the server. The default is unset, which means that the
# default identity will be used.
#ssh_GSSAPIClientIdentity:

# If set, specifies the GSSAPI server identity that ssh should expect when
# connecting to the server. The default is unset, which means that the
# expected GSSAPI server identity will be determined from the target host‐
# name.
#ssh_GSSAPIServerIdentity:

# If set to "yes" then renewal of the client's GSSAPI credentials will force
# the rekeying of the ssh connection. With a compatible server, this can
# delegate the renewed credentials to a session on the server. The default
# is "no".
#ssh_GSSAPIRenewalForcesRekey: 'no'

# Set to "yes to indicate that the DNS is trusted to securely canonicalize"
# the name of the host being connected to. If "no, the hostname entered on
# the" command line will be passed untouched to the GSSAPI library. The
# default is "no". This option only applies to protocol version 2
# connections using GSSAPI.
#ssh_GSSAPITrustDNS: 'no'

# Restricts the following declarations (up to the next Host or Match keyword) to
# be only for those hosts that match one of the patterns given after the
# keyword. If more than one pattern is provided, they should be separated by
# whitespace. A single '*' as a pattern can be used to provide global defaults
# for all hosts. The host is the hostname argument given on the command line
# (i.e. the name is not converted to a canonicalized host name before matching).
#
# A pattern entry may be negated by prefixing it with an exclamation mark ('!').
# If a negated entry is matched, then the Host entry is ignored, regardless of
# whether any other patterns on the line match. Negated matches are therefore
# useful to provide exceptions for wildcard matches.
ssh_Hosts:
 - Host:                     "*"
   LogLevel:                 "{{ ssh_LogLevel | default(omit) }}"
   BatchMode:                "{{ ssh_BatchMode | default(omit) }}"
   Protocol:                 "{{ ssh_Protocol | default(omit) }}"
   HostName:                 "{{ ssh_HostName | default(omit) }}"
   EscapeChar:               "{{ ssh_EscapeChar | default(omit) }}"
   AddressFamily:            "{{ ssh_AddressFamily | default(omit) }}"
   BindAddress:              "{{ ssh_BindAddress | default(omit) }}"
   Port:                     "{{ ssh_Port | default(omit) }}"
   ConnectionAttempts:       "{{ ssh_ConnectionAttempts | default(omit) }}"
   ConnectTimeout:           "{{ ssh_ConnectTimeout | default(omit) }}"
   Compression:              "{{ ssh_Compression | default(omit) }}"
   CompressionLevel:         "{{ ssh_CompressionLevel | default(omit) }}"
   ControlMaster:            "{{ ssh_ControlMaster | default(omit) }}"
   ControlPath:              "{{ ssh_ControlPath | default(omit) }}"
   ControlPersist:           "{{ ssh_ControlPersist | default(omit) }}"
   IPQoS:                    "{{ ssh_IPQoS | default(omit) }}"
   TCPKeepAlive:             "{{ ssh_TCPKeepAlive | default(omit) }}"
   ServerAliveCountMax:      "{{ ssh_ServerAliveCountMax | default(omit) }}"
   ServerAliveInterval:      "{{ ssh_ServerAliveInterval | default(omit) }}"
   UsePrivilegedPort:        "{{ ssh_UsePrivilegedPort | default(omit) }}"
   ProxyCommand:             "{{ ssh_ProxyCommand | default(omit) }}"
   ProxyUseFdpass:           "{{ ssh_ProxyUseFdpass | default(omit) }}"
   PreferredAuthentications: "{{ ssh_PreferredAuthentications | default(omit) }}"
   HostbasedAuthentication:  "{{ ssh_HostbasedAuthentication | default(omit) }}"
   PasswordAuthentication:   "{{ ssh_PasswordAuthentication | default(omit) }}"
   RhostsRSAAuthentication:  "{{ ssh_RhostsRSAAuthentication | default(omit) }}"
   RSAAuthentication:        "{{ ssh_RSAAuthentication | default(omit) }}"
   PubkeyAuthentication:     "{{ ssh_PubkeyAuthentication | default(omit) }}"
   GSSAPIAuthentication:     "{{ ssh_GSSAPIAuthentication | default(omit) }}"
   KbdInteractiveDevices:    "{{ ssh_KbdInteractiveDevices | default(omit) }}"
   KbdInteractiveAuthentication: "{{ ssh_KbdInteractiveAuthentication | default(omit) }}"
   ChallengeResponseAuthentication: "{{ ssh_ChallengeResponseAuthentication | default(omit) }}"
   XAuthLocation:            "{{ ssh_XAuthLocation | default(omit) }}"
   CheckHostIP:              "{{ ssh_CheckHostIP | default(omit) }}"
   RequestTTY:               "{{ ssh_RequestTTY | default(omit) }}"
   IgnoreUnknown:            "{{ ssh_IgnoreUnknown | default(omit) }}"
   EnableSSHKeysign:         "{{ ssh_EnableSSHKeysign | default(omit) }}"
   StrictHostKeyChecking:    "{{ ssh_StrictHostKeyChecking | default(omit) }}"
   NoHostAuthenticationForLocalhost: "{{ ssh_NoHostAuthenticationForLocalhost | default(omit) }}"
   IdentitiesOnly:           "{{ ssh_IdentitiesOnly | default(omit) }}"
   IdentityFile:             "{{ ssh_IdentityFile | default(omit) }}"
   VerifyHostKeyDNS:         "{{ ssh_VerifyHostKeyDNS | default(omit) }}"
   VisualHostKey:            "{{ ssh_VisualHostKey | default(omit) }}"
   HostKeyAlias:             "{{ ssh_HostKeyAlias | default(omit) }}"
   RekeyLimit:               "{{ ssh_RekeyLimit | default(omit) }}"
   PKCS11Provider:           "{{ ssh_PKCS11Provider | default(omit) }}"
   User:                     "{{ ssh_User | default(omit) }}"
   UserKnownHostsFile:       "{{ ssh_UserKnownHostsFile | default(omit) }}"
   GlobalKnownHostsFile:     "{{ ssh_GlobalKnownHostsFile | default(omit) }}"
   HashKnownHosts:           "{{ ssh_HashKnownHosts | default(omit) }}"
   LocalCommand:             "{{ ssh_LocalCommand | default(omit) }}"
   PermitLocalCommand:       "{{ ssh_PermitLocalCommand | default(omit) }}"
   NumberOfPasswordPrompts:  "{{ ssh_NumberOfPasswordPrompts | default(omit) }}"
   SendEnv:                  "{{ ssh_SendEnv | default(omit) }}"
   Cipher:                   "{{ ssh_Cipher | default(omit) }}"
   Ciphers:                  "{{ ssh_Ciphers | default(omit) }}"
   HostKeyAlgorithms:        "{{ ssh_HostKeyAlgorithms | default(omit) }}"
   KexAlgorithms:            "{{ ssh_KexAlgorithms | default(omit) }}"
   MACs:                     "{{ ssh_MACs | default(omit) }}"
   GSSAPIKexAlgorithms:      "{{ ssh_GSSAPIKexAlgorithms | default(omit) }}"
   ClearAllForwardings:      "{{ ssh_ClearAllForwardings | default(omit) }}"
   DynamicForward:           "{{ ssh_DynamicForward | default(omit) }}"
   LocalForward:             "{{ ssh_LocalForward | default(omit) }}"
   RemoteForward:            "{{ ssh_RemoteForward | default(omit) }}"
   ExitOnForwardFailure:     "{{ ssh_ExitOnForwardFailure | default(omit) }}"
   ForwardAgent:             "{{ ssh_ForwardAgent | default(omit) }}"
   AddKeysToAgent:           "{{ ssh_AddKeysToAgent | default(omit) }}"
   ForwardX11:               "{{ ssh_ForwardX11 | default(omit) }}"
   ForwardX11Timeout:        "{{ ssh_ForwardX11Timeout | default(omit) }}"
   ForwardX11Trusted:        "{{ ssh_ForwardX11Trusted | default(omit) }}"
   GatewayPorts:             "{{ ssh_GatewayPorts | default(omit) }}"
   Tunnel:                   "{{ ssh_Tunnel | default(omit) }}"
   TunnelDevice:             "{{ ssh_TunnelDevice | default(omit) }}"
   CanonicalDomains:         "{{ ssh_CanonicalDomains | default(omit) }}"
   CanonicalizeFallbackLocal: "{{ ssh_CanonicalizeFallbackLocal | default(omit) }}"
   CanonicalizeHostname:     "{{ ssh_CanonicalizeHostname | default(omit) }}"
   CanonicalizeMaxDots:      "{{ ssh_CanonicalizeMaxDots | default(omit) }}"
   CanonicalizePermittedCNAMEs: "{{ ssh_CanonicalizePermittedCNAMEs | default(omit) }}"
   GSSAPIDelegateCredentials: "{{ ssh_GSSAPIDelegateCredentials | default(omit) }}"
   GSSAPIKeyExchange:        "{{ ssh_GSSAPIKeyExchange | default(omit) }}"
   GSSAPIClientIdentity:     "{{ ssh_GSSAPIClientIdentity | default(omit) }}"
   GSSAPIServerIdentity:     "{{ ssh_GSSAPIServerIdentity | default(omit) }}"
   GSSAPIRenewalForcesRekey: "{{ ssh_GSSAPIRenewalForcesRekey | default(omit) }}"
   GSSAPITrustDNS:           "{{ ssh_GSSAPITrustDNS | default(omit) }}"
 - "{{ ssh_config_additional_hosts | default([]) }}"

# Restricts the following declarations (up to the next Host or Match keyword) to
# be used only when the conditions following the Match keyword are satisfied.
# Match conditions are specified using one or more keyword/cri‐ teria pairs or
# the single token all which matches all criteria. The available keywords are:
# exec, host, originalhost, user, and localuser.
#
# The exec keyword executes the specified command under the user's shell. If
# the command returns a zero exit status then the condition is considered true.
# Commands containing whitespace characters must be quoted. The following
# character sequences in the command will be expanded prior to execution: '%L'
# will be substituted by the first component of the local host name, '%l' will
# be substituted by the local host name (including any domain name), '%h' will
# be substituted by the target host name, '%n' will be substituted by the
# original target host name specified on the command-line, '%p' the destination
# port, '%r' by the remote login username, and '%u' by the username of the user
# running ssh(1).
#
# The other keywords' criteria must be single entries or comma-separated lists
# and may use the wildcard and negation operators described in the PATTERNS
# section. The criteria for the host keyword are matched against the target
# hostname, after any substitution by the Hostname option. The originalhost
# keyword matches against the hostname as it was specified on the command-line.
# The user keyword matches against the target username on the remote host. The
# localuser keyword matches against the name of the local user running ssh(1)
# (this keyword may be useful in system-wide ssh_config files).
ssh_Matches: []
